cede-pi:
  cede-pico-port:
    USBSerialPort:
      acquired: cede-pico
      avail: true
      cls: NetworkSerialPort
      params:
        extra:
          path: /dev/ttyACM0
          proxy: cede-pi
          proxy_required: false
        host: cede-pi
        port: 47059
        speed: 115200
  cede-uno-port:
    USBSerialPort:
      acquired: cede-uno
      avail: true
      cls: NetworkSerialPort
      params:
        extra:
          path: /dev/ttyACM1
          proxy: cede-pi
          proxy_required: false
        host: cede-pi
        port: 33493
        speed: 115200
