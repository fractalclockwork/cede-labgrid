# Per-application manifest (v0): Pi gateway — Python workload, not MCU UF2.
application_id: ssd1306_dual
target: pi
requires:
  lab_paths:
    build_key: ssd1306_dual_pi_app
    artifact_glob_key: ssd1306_dual_pi_main_glob
resources:
  i2c_oled:
    linux_bus: 1
    displays:
      - address_7bit: 0x3C
        note: "Primary breakout (default SA0 low)"
      - address_7bit: 0x3D
        note: "Secondary breakout (SA0 high / ADDR jumper)"
