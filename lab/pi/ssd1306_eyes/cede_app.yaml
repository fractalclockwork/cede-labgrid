# Per-application manifest (v0): Pi gateway — dual OLED eyes animation.
application_id: ssd1306_eyes
target: pi
requires:
  lab_paths:
    build_key: ssd1306_eyes_pi_app
    artifact_glob_key: ssd1306_eyes_pi_main_glob
resources:
  i2c_oled:
    linux_bus: 1
    displays:
      - address_7bit: 0x3C
        note: "Left panel (physical placement)"
      - address_7bit: 0x3D
        note: "Right panel — mirror drawing optional"
