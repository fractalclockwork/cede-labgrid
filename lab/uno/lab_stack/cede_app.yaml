application_id: lab_stack
target: uno
requires:
  lab_paths:
    build_key: lab_stack_uno_build
    artifact_glob_key: lab_stack_uno_hex_glob
resources:
  usb_serial:
    banner_prefix: "CEDE lab_stack ok"
  i2c_slave:
    address: 0x43
    registers:
      0: { kind: status, expect_boot_magic: 0xCE }
