# Copy to lab/config/lab.yaml (gitignored) or set CEDE_LAB_CONFIG.
# Paths below are relative to the repository root unless absolute.

schema_version: 1

hosts:
  dev_host:
    role: dev-host
    repo_root: "~/src/cede"
  pi:
    role: raspberry-pi-gateway
    ssh_host: cede-pi.local
    ssh_user: pi
    # Sparse flash-deps directory on the Pi (sync_gateway_flash_deps.sh → lab/pi/Makefile + scripts only).
    # Not a git clone — keep firmware/native binaries on the Dev-Host and scp or gateway-make copy them.
    repo_root: "~/cede"

serial:
  defaults:
    baud: 115200
    newline: "\n"
    timeout_s: 2.0
  devices:
    pico:
      by_id_glob: "/dev/serial/by-id/usb-Raspberry_Pi_*"
      fallback_globs:
        - "/dev/ttyACM*"
    uno:
      by_id_glob: "/dev/serial/by-id/usb-Arduino_*"
      fallback_globs:
        - "/dev/ttyUSB*"
        - "/dev/ttyACM*"

paths:
  pico_build: "lab/pico/hello_lab/build"
  pico_uf2_glob: "lab/pico/hello_lab/build/*.uf2"
  uno_build: "lab/uno/hello_lab/build"
  uno_hex_glob: "lab/uno/hello_lab/build/*.hex"
  logs_dir: "lab/pi/logs"
  test_results_dir: "lab/tests/results"
  i2c_hello_pico_build: "demo_apps/pico/i2c_hello/build"
  i2c_hello_pico_uf2_glob: "demo_apps/pico/i2c_hello/build/*.uf2"
  i2c_hello_uno_build: "demo_apps/uno/i2c_hello/build"
  i2c_hello_uno_hex_glob: "demo_apps/uno/i2c_hello/build/*.hex"
  # Demo app paths are not registered here — each app is self-describing
  # via its own cede_app.yaml (see demo_apps/*/cede_app.yaml).

# Multi-target demo application: join key i2c_hello — path keys must exist under paths.* above.
applications:
  i2c_hello:
    targets:
      pico:
        paths_build_key: i2c_hello_pico_build
        paths_artifact_glob_key: i2c_hello_pico_uf2_glob
      uno:
        paths_build_key: i2c_hello_uno_build
        paths_artifact_glob_key: i2c_hello_uno_hex_glob

  # Demo apps (ssd1306_frame_test, ssd1306_eyes, etc.) are self-describing —
  # see demo_apps/*/cede_app.yaml. They are not registered here.

# Optional target metadata (keys reference existing paths.* and serial.devices.* property names).
targets:
  pico:
    kind: mcu
    paths:
      build_key: pico_build
      artifact_glob_key: pico_uf2_glob
    serial_devices_key: pico
  uno:
    kind: mcu
    paths:
      build_key: uno_build
      artifact_glob_key: uno_hex_glob
    serial_devices_key: uno
  pi:
    kind: gateway
    hosts_key: pi

# Hello Lab Test 7 — only enabled pairs are exercised; n/a pairs must declare reason.
# Wiring + electrical policy (level shifting, pull-ups, pin maps): lab/pi/docs/bus-wiring.md
i2c_matrix:
  bus_hz: 100000
  # Default when tooling reads a single address; enabled pairs should set probe_address explicitly.
  probe_address: 0x42
  pairs:
    - initiator: rpi
      target: pico
      status: enabled
      linux_bus: 1
      probe_address: 0x42
      notes: "cede-rp2 hello_lab @ 0x42 (GP0/1, LV). Coexists with Uno @ 0x43 on the shifter."
      validation:
        mode: rpi_master_i2cdev_read
        controller: rpi
        reg: 0
        expect_byte: 0xCE

    - initiator: rpi
      target: uno
      status: enabled
      linux_bus: 1
      probe_address: 0x43
      notes: "cede-uno hello_lab @ 0x43 (A4/A5, HV). Distinct from Pico @ 0x42 on the same bus."
      validation:
        mode: rpi_master_i2cdev_read
        controller: rpi
        reg: 0
        expect_byte: 0xCE

metrics:
  enabled: false
  prefix: "cede_lab"

# --- LabGrid multi-exporter provisioning ---
# Global coordinator address shared by all exporters.
labgrid:
  coordinator_address: "192.168.1.111:20408"

# Each entry provisions one gateway and its attached hardware resources.
# Cloud-init creates the labgrid venv, deploys the exporter config + systemd service.
# USB serial IDs: run `udevadm info /dev/ttyACM0 | grep ID_SERIAL_SHORT` on the gateway.
exporters:
  - name: cede-pi
    hostname: cede-pi
    ssh_user: pi
    ssh_host: cede-pi.local
    location: cede-lab-bench-1
    authorized_keys_file: "~/.ssh/id_ed25519.pub"
    timezone: UTC
    locale: en_US.UTF-8
    os_image:
      url: "https://downloads.raspberrypi.com/raspios_lite_arm64/images/raspios_lite_arm64-2026-04-21/2026-04-21-raspios-trixie-arm64-lite.img.xz"
      sha256: "4cd31df026fd82243805a326dc0cafd7383f7e3d30c9413e7044d507aae281e2"
      cache_path: "lab/pi/dist/raspios_trixie_arm64_latest.img.xz"
    resources:
      - group: cede-pico-port
        type: USBSerialPort
        match:
          ID_SERIAL_SHORT: "E660C06213580D29"
        speed: 115200
        place: cede-pico
        place_tags:
          board: pico
      - group: cede-uno-port
        type: USBSerialPort
        match:
          ID_SERIAL_SHORT: "74137363737351117051"
        speed: 115200
        place: cede-uno
        place_tags:
          board: uno
    # wifi:
    #   ssid: "my-network"
    #   regulatory_domain: "US"
    #   psk_file: "~/secrets/home-wifi.psk"

  # Second exporter (uncomment when BeagleBone gateway is ready):
  # - name: cede-bbb
  #   hostname: cede-bbb
  #   ssh_user: debian
  #   ssh_host: cede-bbb.local
  #   location: cede-lab-bench-2
  #   authorized_keys_file: "~/.ssh/id_ed25519.pub"
  #   os_image:
  #     url: "https://..."
  #     sha256: "..."
  #     cache_path: "lab/pi/dist/beaglebone_latest.img.xz"
  #   resources:
  #     - group: bbb-pico-port
  #       type: USBSerialPort
  #       match:
  #         ID_SERIAL_SHORT: "XXXXXXXXXXXXXXXX"
  #       speed: 115200
  #       place: bbb-pico
  #       place_tags:
  #         board: pico
  #     - group: bbb-uno-port
  #       type: USBSerialPort
  #       match:
  #         ID_SERIAL_SHORT: "YYYYYYYYYYYYYYYY"
  #       speed: 115200
  #       place: bbb-uno
  #       place_tags:
  #         board: uno

