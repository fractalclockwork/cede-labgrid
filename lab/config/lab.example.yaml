# Copy to lab/config/lab.yaml (gitignored) or set CEDE_LAB_CONFIG.
# Paths below are relative to the repository root unless absolute.

schema_version: 1

hosts:
  dev_host:
    role: dev-host
    repo_root: "~/src/cede"
  pi:
    role: raspberry-pi-gateway
    ssh_host: cede-pi.local
    ssh_user: pi
    # Sparse flash-deps directory on the Pi (sync_gateway_flash_deps.sh → lab/pi/Makefile + scripts only).
    # Not a git clone — keep firmware/native binaries on the Dev-Host and scp or gateway-make copy them.
    repo_root: "~/cede"

serial:
  defaults:
    baud: 115200
    newline: "\n"
    timeout_s: 2.0
  devices:
    pico:
      by_id_glob: "/dev/serial/by-id/usb-Raspberry_Pi_*"
      fallback_globs:
        - "/dev/ttyACM*"
    uno:
      by_id_glob: "/dev/serial/by-id/usb-Arduino_*"
      fallback_globs:
        - "/dev/ttyUSB*"
        - "/dev/ttyACM*"

paths:
  pico_build: "lab/pico/hello_lab/build"
  pico_uf2_glob: "lab/pico/hello_lab/build/*.uf2"
  uno_build: "lab/uno/hello_lab/build"
  uno_hex_glob: "lab/uno/hello_lab/build/*.hex"
  logs_dir: "lab/pi/logs"
  test_results_dir: "lab/tests/results"
  lab_stack_pico_build: "lab/pico/lab_stack/build"
  lab_stack_pico_uf2_glob: "lab/pico/lab_stack/build/*.uf2"
  lab_stack_uno_build: "lab/uno/lab_stack/build"
  lab_stack_uno_hex_glob: "lab/uno/lab_stack/build/*.hex"
  ssd1306_dual_pi_app: "lab/pi/ssd1306_dual"
  ssd1306_dual_pi_main_glob: "lab/pi/ssd1306_dual/main.py"
  ssd1306_eyes_pi_app: "lab/pi/ssd1306_eyes"
  ssd1306_eyes_pi_main_glob: "lab/pi/ssd1306_eyes/main.py"

# Multi-target application: join key lab_stack — path keys must exist under paths.* above.
applications:
  lab_stack:
    targets:
      pico:
        paths_build_key: lab_stack_pico_build
        paths_artifact_glob_key: lab_stack_pico_uf2_glob
      uno:
        paths_build_key: lab_stack_uno_build
        paths_artifact_glob_key: lab_stack_uno_hex_glob

  # Pi-only: dual SSD1306 OLED demo (Python on gateway — see lab/pi/ssd1306_dual/README.md).
  ssd1306_dual:
    targets:
      pi:
        paths_build_key: ssd1306_dual_pi_app
        paths_artifact_glob_key: ssd1306_dual_pi_main_glob

  ssd1306_eyes:
    targets:
      pi:
        paths_build_key: ssd1306_eyes_pi_app
        paths_artifact_glob_key: ssd1306_eyes_pi_main_glob

# Optional target metadata (keys reference existing paths.* and serial.devices.* property names).
targets:
  pico:
    kind: mcu
    paths:
      build_key: pico_build
      artifact_glob_key: pico_uf2_glob
    serial_devices_key: pico
  uno:
    kind: mcu
    paths:
      build_key: uno_build
      artifact_glob_key: uno_hex_glob
    serial_devices_key: uno
  pi:
    kind: gateway
    hosts_key: pi

# Hello Lab Test 7 — only enabled pairs are exercised; n/a pairs must declare reason.
# Wiring + electrical policy (level shifting, pull-ups, pin maps): lab/pi/docs/bus-wiring.md
i2c_matrix:
  bus_hz: 100000
  # Default when tooling reads a single address; enabled pairs should set probe_address explicitly.
  probe_address: 0x42
  pairs:
    - initiator: rpi
      target: pico
      status: enabled
      linux_bus: 1
      probe_address: 0x42
      notes: "cede-rp2 hello_lab @ 0x42 (GP0/1, LV). Coexists with Uno @ 0x43 on the shifter."
      validation:
        mode: rpi_master_i2cdev_read
        controller: rpi
        reg: 0
        expect_byte: 0xCE

    - initiator: rpi
      target: uno
      status: enabled
      linux_bus: 1
      probe_address: 0x43
      notes: "cede-uno hello_lab @ 0x43 (A4/A5, HV). Distinct from Pico @ 0x42 on the same bus."
      validation:
        mode: rpi_master_i2cdev_read
        controller: rpi
        reg: 0
        expect_byte: 0xCE

metrics:
  enabled: false
  prefix: "cede_lab"

# Optional: drive SD imaging / cloud-init from this file (see lab/pi/docs/sdcard.md).
# Pi 3 B gateway + Ethernet DHCP + SSH: lab/pi/docs/rpi3-gateway-remote.md
# Build artifact, transfer, dd flash: lab/pi/docs/pi-gateway-image-transfer-flash.md
# hosts.pi.ssh_host should be "<hostname>.local" when using mDNS (not an IP).
raspberry_pi_bootstrap:
  hostname: cede-pi
  # Headless SSH: uncomment and set path to your Dev-Host PUBLIC key (.pub). Required if you did not
  # create the OS user/password via Raspberry Pi Imager or keyboard. See lab/pi/docs/ssh-keys-bootstrap.md
  # The rendered user-data adds Pi-style groups (including sudo) and NOPASSWD sudo for that user.
  authorized_keys_file: "~/.ssh/id_ed25519.pub"
  timezone: UTC
  locale: en_US.UTF-8
  os_image:
    # Raspberry Pi OS Lite (64-bit), Debian Trixie — boot-partition cloud-init (hostname, SSH, keys).
    # Bookworm lite images ignore these files; you will keep hostname raspberrypi and no headless SSH.
    # Pin url + sha256 from https://www.raspberrypi.com/software/operating-systems/
    url: "https://downloads.raspberrypi.com/raspios_lite_arm64/images/raspios_lite_arm64-2026-04-21/2026-04-21-raspios-trixie-arm64-lite.img.xz"
    sha256: "4cd31df026fd82243805a326dc0cafd7383f7e3d30c9413e7044d507aae281e2"
    # Distinct name avoids reusing an older Bookworm .xz left in lab/pi/dist/ at the previous path.
    cache_path: "lab/pi/dist/raspios_trixie_arm64_latest.img.xz"
  # wifi:
  #   ssid: "my-network"
  #   regulatory_domain: "US"
  #   psk_file: "~/secrets/home-wifi.psk"
