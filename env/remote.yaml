# LabGrid environment for Dev-Host -> Pi exporter via coordinator.
# Usage: pytest --lg-env env/remote.yaml --lg-coordinator HOST:PORT lab/tests/...
#
# For single-target testing, use env/uno.yaml or env/pico.yaml instead.
#
# Requires:
#   - labgrid-coordinator running
#   - labgrid-exporter running on Pi
#   - Places acquired: labgrid-client -p cede-uno acquire; labgrid-client -p cede-pico acquire

targets:
  cede-pico:
    resources:
      RemotePlace:
        name: cede-pico
      NetworkService:
        address: 'cede-pi.local'
        username: 'pi'
    drivers:
      SSHDriver: {}
      SerialDriver: {}
      PicotoolFlashDriver:
        image: 'pico_uf2'
      CedeValidationDriver:
        role: 'pico'
        image: 'pico_uf2'
      CedeResetDriver:
        method: 'picotool'
      CedeStrategy: {}

  cede-uno:
    resources:
      RemotePlace:
        name: cede-uno
      NetworkService:
        address: 'cede-pi.local'
        username: 'pi'
      USBSerialPort:
        match:
          ID_SERIAL_SHORT: '74137363737351117051'
        speed: 115200
    drivers:
      SSHDriver: {}
      SerialDriver: {}
      AvrdudeFlashDriver:
        image: 'uno_hex'
      CedeValidationDriver:
        role: 'uno'
        image: 'uno_hex'
      CedeResetDriver:
        method: 'dtr'
      CedeStrategy: {}

  cede-pi:
    resources:
      NetworkService:
        address: 'cede-pi.local'
        username: 'pi'
    drivers:
      SSHDriver: {}
      CedeI2CDriver:
        bus: 1

images:
  pico_uf2: '../lab/pico/hello_lab/build/hello_lab.uf2'
  uno_hex: '../lab/uno/hello_lab/build/hello_lab.ino.hex'
  pico_uf2_lab_stack: '../lab/pico/lab_stack/build/lab_stack.uf2'
  uno_hex_lab_stack: '../lab/uno/lab_stack/build/lab_stack.ino.hex'

tools:
  picotool: '/usr/bin/picotool'
  avrdude: '/usr/bin/avrdude'

imports:
  - cede_labgrid.drivers.picotool_flash
  - cede_labgrid.drivers.avrdude_flash
  - cede_labgrid.drivers.cede_validation
  - cede_labgrid.drivers.cede_reset
  - cede_labgrid.drivers.cede_i2c
  - cede_labgrid.strategies.cede_strategy
