name: CEDE smoke

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build images and run smoke checks
        run: |
          make -C lab/docker build-images
          make -C lab/docker smoke
          make -C lab/docker pico-build
          make -C lab/docker uno-build
          make pi-gateway-build-native-hello
          make -C lab/docker test-config

      - name: Pytest (config validation + Hello Lab scaffold)
        run: |
          docker compose -f lab/docker/docker-compose.yml run --rm orchestration-dev \
            bash -lc 'cd /workspace && pytest -q lab/tests/'

  labgrid-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install deps
        run: uv sync

      - name: Verify LabGrid driver imports
        run: |
          uv run python -c "
          from cede_labgrid.drivers.picotool_flash import PicotoolFlashDriver
          from cede_labgrid.drivers.avrdude_flash import AvrdudeFlashDriver
          from cede_labgrid.drivers.cede_validation import CedeValidationDriver
          from cede_labgrid.drivers.cede_reset import CedeResetDriver
          from cede_labgrid.drivers.cede_i2c import CedeI2CDriver
          from cede_labgrid.strategies.cede_strategy import CedeStrategy
          print('All CEDE LabGrid drivers import OK')
          "

      - name: Validate strategy registration and state methods
        run: |
          uv run python -c "
          import cede_labgrid.drivers.picotool_flash
          import cede_labgrid.drivers.avrdude_flash
          import cede_labgrid.drivers.cede_validation
          import cede_labgrid.drivers.cede_reset
          import cede_labgrid.drivers.cede_i2c
          import cede_labgrid.strategies.cede_strategy

          from labgrid.factory import target_factory
          cls = target_factory.class_from_string('CedeStrategy')
          assert cls is not None, 'CedeStrategy not registered in target_factory'

          for state in ('state_off', 'state_flashed', 'state_validated'):
              assert callable(getattr(cls, state, None)), f'{state} missing from CedeStrategy'

          print(f'Strategy {cls.__name__} registered OK — states: off, flashed, validated')
          print('Strategy validation passed')
          "
