# CEDE application manifest — everything cede-labgrid needs to know about this app.
application_id: i2c_hello
target: pico
entrypoint: build/*.uf2
resources:
  usb_serial:
    banner_prefix: "CEDE i2c_hello rp2 ok"
  i2c_slave:
    address: 0x42
    registers:
      0: { kind: status, expect_boot_magic: 0xCE }
