# CEDE application manifest — everything cede-labgrid needs to know about this app.
application_id: ssd1306_eyes
target: pi
entrypoint: main.py
gateway: pi@cede-pi.local
resources:
  i2c_oled:
    linux_bus: 1
    displays:
      - address_7bit: 0x3C
        note: "Left panel (physical placement)"
      - address_7bit: 0x3D
        note: "Right panel — mirror drawing optional"
